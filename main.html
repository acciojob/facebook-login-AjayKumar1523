<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook - Log in or sign up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f6f6f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Helvetica, Arial, sans-serif;
    }

    .left {
      width: 450px;
      margin-top: 70px;
      display: inline-block;
      padding-right: 40px;
    }

    .left img {
      width: 280px;
      margin-bottom: 1rem;
    }

    .left p {
      font-size: 1.1rem;
      line-height: 1.5;
      color: #1c1e21;
    }

    .right {
      display: inline-block;
    }

    form {
      display: flex;
      width: 300px;
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px #ccc;
      flex-direction: column;
      gap: 10px;
    }

    form input {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
      font-size: 1rem;
      outline: none;
      color: #444;
    }
    form input::placeholder { color: #888; }
    form input:focus { border-color: #1877f2; }

    form button[type="submit"] {
      background-color: #1877f2;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      width: 100%;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    form button[type="submit"]:hover { background-color: #1665d4; }

    form a {
      text-decoration: none;
      color: #1877f2;
      text-align: center;
      font-size: 0.9rem;
    }
    form a:hover { text-decoration: underline; }

    .signup {
      display: block;
      width: 100%;
      background-color: #42b72a;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .signup:hover { background-color: #36a420; }
  </style>
</head>
<body>

  <!-- LEFT SECTION -->
  <div class="left">
    <img src="https://static.xx.fbcdn.net/rsrc.php/y8/r/dF5SId3UHWd.svg" alt="Facebook logo"/>
    <p>Facebook helps you connect and share with the people in your life.</p>
  </div>

  <!-- RIGHT SECTION -->
  <div class="right">
    <form>
      <input type="text" id="email" placeholder="Email address or phone number"/>
      <input type="password" id="password" placeholder="Password"/>
      <button type="submit">Log in</button>
      <a href="#">Forgotten account?</a>
    </form>
    <button class="signup">Create new account</button>
  </div>

</body>
</html>
